<svg width="600" height="120" viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="underline" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00ffcc" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#00ffcc"/>
      <stop offset="75%"  stop-color="#0044ff"/>
      <stop offset="100%" stop-color="#0044ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="lineGlow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Wordmark -->
  <text
    x="0"
    y="72"
    font-family="'Plus Jakarta Sans', 'DM Sans', 'Helvetica Neue', Arial, sans-serif"
    font-weight="700"
    font-size="68"
    fill="#ffffff"
    letter-spacing="-1">Calibrate</text>

  <!-- Glow underline -->
  <rect x="0" y="88" width="480" height="3" rx="1.5" fill="url(#underline)" filter="url(#lineGlow)"/>
</svg>
