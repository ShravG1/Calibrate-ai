<svg width="512" height="512" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="waveGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#00ffcc" stop-opacity="0"/>
      <stop offset="18%"  stop-color="#00ffcc"/>
      <stop offset="50%"  stop-color="#00aaff"/>
      <stop offset="82%"  stop-color="#0055ff"/>
      <stop offset="100%" stop-color="#0055ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="echoGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#00ffcc" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#00ffcc" stop-opacity="0.3"/>
      <stop offset="50%"  stop-color="#00aaff" stop-opacity="0.3"/>
      <stop offset="80%"  stop-color="#0055ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0055ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00ccff" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#0055ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00ccff" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="dotGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#00ffcc"/>
      <stop offset="100%" stop-color="#00ffcc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="dotGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0055ff"/>
      <stop offset="100%" stop-color="#0055ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#0b1830"/>
      <stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
    <clipPath id="circClip">
      <circle cx="110" cy="110" r="88"/>
    </clipPath>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <circle cx="110" cy="110" r="110" fill="url(#bgGrad)"/>

  <!-- Outer ring -->
  <circle cx="110" cy="110" r="100" fill="none" stroke="#0d1e38" stroke-width="1.5"/>
  <!-- Inner ring guide -->
  <circle cx="110" cy="110" r="88" fill="none" stroke="url(#ringGrad)" stroke-width="1"/>

  <!-- Subtle grid lines -->
  <line x1="22" y1="110" x2="198" y2="110" stroke="#0a1828" stroke-width="0.8" clip-path="url(#circClip)"/>
  <line x1="110" y1="22" x2="110" y2="198" stroke="#0a1828" stroke-width="0.8" clip-path="url(#circClip)"/>

  <!-- Echo wave below -->
  <path d="M 22 110 C 44 158, 66 158, 88 110 C 110 62, 132 62, 154 110 C 176 158, 198 158, 220 110"
    fill="none" stroke="url(#echoGrad)" stroke-width="14"
    stroke-linecap="round" clip-path="url(#circClip)"
    transform="translate(0 22)"/>

  <!-- Echo wave above -->
  <path d="M 22 110 C 44 158, 66 158, 88 110 C 110 62, 132 62, 154 110 C 176 158, 198 158, 220 110"
    fill="none" stroke="url(#echoGrad)" stroke-width="14"
    stroke-linecap="round" clip-path="url(#circClip)"
    transform="translate(0 -22)"/>

  <!-- Main wave -->
  <path d="M 22 110 C 44 158, 66 158, 88 110 C 110 62, 132 62, 154 110 C 176 158, 198 158, 220 110"
    fill="none" stroke="url(#waveGrad)" stroke-width="5.5"
    stroke-linecap="round" clip-path="url(#circClip)"
    filter="url(#glow)"/>

  <!-- Left dot -->
  <circle cx="28" cy="110" r="14" fill="url(#dotGlow1)" opacity="0.4"/>
  <circle cx="28" cy="110" r="6.5" fill="#00ffcc" filter="url(#glowSoft)"/>
  <circle cx="28" cy="110" r="3" fill="#ffffff"/>

  <!-- Right dot -->
  <circle cx="192" cy="110" r="14" fill="url(#dotGlow2)" opacity="0.4"/>
  <circle cx="192" cy="110" r="6.5" fill="#0055ff" filter="url(#glowSoft)"/>
  <circle cx="192" cy="110" r="3" fill="#ffffff"/>

  <!-- Wave crest highlights -->
  <circle cx="88"  cy="110" r="4" fill="#00aaff" opacity="0.7" filter="url(#glowSoft)"/>
  <circle cx="154" cy="110" r="4" fill="#00aaff" opacity="0.7" filter="url(#glowSoft)"/>
</svg>
